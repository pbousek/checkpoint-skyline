# Prometheus TLS konfigurace pro Remote Write endpoint
# Check Point OpenTelemetry Collector se připojuje na https://<server>:9090/api/v1/write
#
# Certifikáty vložit do ./certs/:
#   prometheus.crt  — certifikát serveru (nebo self-signed)
#   prometheus.key  — privátní klíč
#   ca.crt          — CA certifikát pro ověření klientů (jen při mTLS)
#
# Jak vygenerovat self-signed certifikát:
#   openssl req -x509 -newkey rsa:4096 -keyout certs/prometheus.key \
#     -out certs/prometheus.crt -days 3650 -nodes \
#     -subj "/CN=prometheus" -addext "subjectAltName=IP:<IP serveru>,DNS:<hostname>"
#
# CA cert pro Check Point stranu: certs/ca.crt (nebo prometheus.crt pokud self-signed)

tls_server_config:
  cert_file: /etc/prometheus/certs/prometheus.crt
  key_file:  /etc/prometheus/certs/prometheus.key

  # mTLS — ověření klienta (Check Point kolektoru). Odkomentovat pokud CP vyžaduje mTLS:
  # client_ca_file:    /etc/prometheus/certs/ca.crt
  # client_auth_type:  RequireAndVerifyClientCert
