services:

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-latest}
    restart: unless-stopped
    ports:
      # Port 9090 musí být dostupný z Check Point sítě pro Remote Write.
      # Doporučeno omezit firewallem jen na IP adresu CP kolektoru.
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/web.yml:/etc/prometheus/web.yml:ro
      - ./certs:/etc/prometheus/certs:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.config.file=/etc/prometheus/web.yml
      - --web.enable-remote-write-receiver
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-90d}
      - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-10GB}
      - --web.enable-lifecycle

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-latest}
    restart: unless-stopped
    # Port Grafany není exponován přímo ven — přístup zajišťuje Caddy (viz níže).
    # Pokud Caddy nepoužíváš a chceš přistupovat přímo, odkomentuj:
    # ports:
    #   - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_SERVER_ROOT_URL=https://${GRAFANA_DOMAIN:-localhost}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/etc/grafana/provisioning/dashboards/json:ro
    depends_on:
      - prometheus

  # Caddy — reverse proxy s automatickým TLS (Let's Encrypt).
  #
  # Požadavky:
  #   - server musí mít veřejnou IP a DNS záznam pro GRAFANA_DOMAIN
  #   - porty 80 a 443 musí být dostupné z internetu (pro ACME challenge)
  #
  # Pokud chceš použít jinou reverse proxy (nginx, Traefik, Apache...):
  #   1. Odkomentuj výše ports: u grafana service
  #   2. Tuto sekci smaž nebo nech zakomentovanou
  #   3. Nakonfiguruj svou proxy aby proxovala na localhost:${GRAFANA_PORT:-3000}
  #      a případně nastavila hlavičky X-Forwarded-For / X-Real-IP
  caddy:
    image: caddy:${CADDY_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - GRAFANA_DOMAIN=${GRAFANA_DOMAIN:-monitoring.example.com}
    depends_on:
      - grafana

  # Alertmanager — zatím vypnutý, odkomentovat až bude potřeba
  #
  # alertmanager:
  #   image: prom/alertmanager:${ALERTMANAGER_VERSION:-latest}
  #   restart: unless-stopped
  #   ports:
  #     - "${ALERTMANAGER_PORT:-9093}:9093"
  #   volumes:
  #     - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
  #     - alertmanager_data:/alertmanager
  #   command:
  #     - --config.file=/etc/alertmanager/alertmanager.yml
  #     - --storage.path=/alertmanager

volumes:
  prometheus_data:
  grafana_data:
  caddy_data:
  caddy_config:
  # alertmanager_data:
